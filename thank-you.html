<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Decipher Magazine</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>

 
    .thank-you-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.2) 100%), url("img/bg.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    padding: 20px; /* ✅ adds breathing space on small screens */
    box-sizing: border-box;
}

.thank-you-content {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    padding: 60px 40px;
    border-radius: 20px;
    text-align: center;
    max-width: 600px;
    width: 100%; /* ✅ ensures it doesn’t overflow */
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    border: 1px solid rgba(255,255,255,0.2);
}

        
     
        .thank-you-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        .thank-you-title {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        .thank-you-message {
            font-size: 1.2rem;
            color: #7f8c8d;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .home-button {
            display: inline-block;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            padding: 15px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }
        
        .home-button:hover {
            background: linear-gradient(135deg, #2980b9, #1f5f8b);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }
        
        .auto-redirect {
            margin-top: 20px;
            color: #95a5a6;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="thank-you-container">
        <div class="thank-you-content">
            <div class="thank-you-icon">✅</div>
            <h1 class="thank-you-title">Thank You!</h1>
            <p class="thank-you-message">
                Your feedback has been received successfully. We appreciate your input.
            </p>
            <a href="index.html" class="home-button">Return to Homepage</a>
            <p class="auto-redirect">You will be automatically redirected in <span id="countdown">5</span> seconds...</p>
        </div>
    </div>

    <script>
        // Auto redirect after 3 seconds - Multiple approaches
        let countdown = 3;
        const countdownElement = document.getElementById('countdown');
        
        // Method 1: Simple setTimeout
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 3000);
        
        // Method 2: Countdown display
        function updateCountdown() {
            if (countdown > 0) {
                countdownElement.textContent = countdown;
                countdown--;
                setTimeout(updateCountdown, 1000);
            }
        }
        
        // Start countdown display
        updateCountdown();
        
        // Method 3: Backup redirect (in case first one fails)
        setTimeout(() => {
            if (window.location.pathname.includes('thank-you')) {
                window.location.replace('index.html');
            }
        }, 6000);
    </script>
</body>
</html>
