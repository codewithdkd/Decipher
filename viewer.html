<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=no">
<title>Decipher PDF Viewer</title>
<meta name="description" content="Secure premium PDF viewer for DECIPHER magazine issues">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<link rel="stylesheet" href="viewer.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="view-tracker.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
</script>
<link rel="icon" type="image/png" href="img/favicon.png">
<link rel="apple-touch-icon" href="img/favicon.png">
</head>
<body class="flowpaper-theme">

<!-- Top Header matching Reference -->
<header class="sp-header" role="banner">
  <div class="sp-header-left">
    <div class="sp-title">
      <span id="pdfFileName">Magazine</span>
    </div>
    <div class="sp-header-divider"></div>
    <div class="sp-page-nav">
      <span class="sp-label">Pages:</span>
      <div class="sp-page-box"><span id="pageCurrent">1</span></div>
      <span class="sp-divider">/</span>
      <span class="sp-total" id="pageTotal">-</span>
    </div>
  </div>
  <div class="sp-header-right">
    <a href="index.html" class="nav-button" title="Home">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
    </a>
    <a href="issues.html" class="nav-button" title="Magazine Issues">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
    </a>
  </div>
</header>

<!-- Chevron side navigation -->
<div class="side-nav-wrapper">
  <button class="side-nav-btn left" id="btnPrevDoc" title="Previous Page">
    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
  </button>
  <button class="side-nav-btn right" id="btnNextDoc" title="Next Page">
    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
  </button>
</div>

<!-- Thumbnail Sidebar -->
<div class="sp-thumbnail-sidebar" id="thumbnailSidebar">
  <div class="sp-thumbnail-header">
    <span>Pages</span>
    <button id="btnCloseThumbnails">&times;</button>
  </div>
  <div class="sp-thumbnail-grid" id="thumbnailGrid"></div>
</div>

<main class="viewer-stage" id="viewerStage">
  <!-- Interactive Zoom Wrapper -->
  <div id="panZoomWrapper" class="pan-zoom-container">
    <div id="flipbookStage" class="flipbook-stage">
      <div id="flipbook" class="flipbook">
        <!-- Canvas pages generated by JS -->
      </div>
    </div>
  </div>

  <!-- Loading State -->
  <div id="viewerLoader" class="viewer-loader">
    <div class="loader-ring"></div>
    <p>Loading Magazine...</p>
  </div>
</main>

<!-- Bottom Toolbar -->
<div class="sp-bottom-toolbar hide-on-idle" id="glassToolbar">
  <button class="sp-tool-btn" id="btnGrid" title="Thumbnails">
    <!-- Grid icon -->
    <svg viewBox="0 0 24 24"><path d="M4 4h6v6H4V4zm8 0h6v6h-6V4zm-8 8h6v6H4v-6zm8 0h6v6h-6v-6z"/></svg>
  </button>
  <div class="sp-tool-divider"></div>
  
  <div class="zoom-wrapper">
    <button class="sp-tool-btn" id="btnZoomToggle" title="Zoom">
      <!-- Magnifier -->
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/><path d="M12 10h-2v2H9v-2H7V9h2V7h1v2h2v1z"/></svg>
    </button>
    <div class="zoom-slider-popup" id="zoomPopup">
      <button id="btnZoomOutSlider" class="zoom-icon">-</button>
      <input type="range" class="zoom-range" min="1" max="4" step="0.1" value="1" id="zoomSliderInput">
      <button id="btnZoomInSlider" class="zoom-icon">+</button>
    </div>
  </div>

  <div class="sp-tool-divider"></div>
  <button class="sp-tool-btn" id="btnFullScreen" title="Full Screen">
    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
  </button>
  
  <div style="display:none;" id="zoomLevel">100%</div>
  <div class="progress-fill" id="progressFill" style="display: none;"></div>
</div>

<!-- Logo Card Bottom Right -->
<div class="sp-logo-card">
  <img src="img/logo.png" alt="Decipher Logo">
</div>

<script src="viewer.js"></script>
</body>
</html>
