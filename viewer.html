<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Magazine PDF Viewer</title>
    <link rel="stylesheet" href="viewer.css">
</head>
<body>

<div class="viewer-container">
    <div class="toolbar">
        <button id="prev">Prev</button>
        <span>Page: <span id="page_num"></span> / <span id="page_count"></span></span>
        <button id="next">Next</button>

        <button id="zoomIn">+</button>
        <button id="zoomOut">-</button>

        <input type="text" id="searchInput" placeholder="Search text...">
        <button id="searchBtn">Search</button>
    </div>

    <canvas id="pdf-render"></canvas>
</div>

<footer class="custom-footer">
    <div class="footer-left">Designed By - Deepak</div>
    <div class="footer-center">© 2025 Decipher</div>
    <div class="footer-right">Design & Build</div>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
<script src="viewer.js"></script>

</body>
</html>
